name: LAKAY — Deploy

on:
  push:
    branches: [main]
    paths:
      - 'livrables/applications/LAKAY/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/lakay-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/lakay-frontend

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: livrables/applications/LAKAY

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: lakay_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: livrables/applications/LAKAY/backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: livrables/applications/LAKAY/backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: livrables/applications/LAKAY/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lakay_test

      - name: Run backend tests
        run: npm test --if-present
        working-directory: livrables/applications/LAKAY/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lakay_test
          JWT_SECRET: test-secret-key-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-key-minimum-32-characters
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: livrables/applications/LAKAY/backend
          file: livrables/applications/LAKAY/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: livrables/applications/LAKAY/frontend
          file: livrables/applications/LAKAY/docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ vars.NEXT_PUBLIC_SOCKET_URL }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/lakay
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            docker pull ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            IMAGE_TAG=${{ github.sha }} docker compose up -d --no-build
            docker image prune -f
            echo "✅ LAKAY deployed — commit ${{ github.sha }}"
